name: E2E Tests

on:
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      VITE_SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
      VITE_SANITY_DATASET: production
      VITE_SANITY_API_VERSION: 2025-12-12
      MIDSCENE_MODEL_NAME: ${{ secrets.MIDSCENE_MODEL_NAME }}
      MIDSCENE_MODEL_API_KEY: ${{ secrets.MIDSCENE_MODEL_API_KEY }}
      MIDSCENE_MODEL_BASE_URL: ${{ secrets.MIDSCENE_MODEL_BASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Sanity types
        run: npm run generate-types
        working-directory: apps/studio

      - name: Build shared package
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npm test

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Midscene report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: midscene-report
          path: midscene_run/
          retention-days: 14
