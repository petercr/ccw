name: E2E Tests

on:
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      VITE_SANITY_PROJECT_ID: ${{ vars.SANITY_PROJECT_ID }}
      VITE_SANITY_DATASET: ${{ vars.VITE_SANITY_DATASET }}
      VITE_SANITY_API_VERSION: ${{ vars.VITE_SANITY_API_VERSION }}
      SANITY_STUDIO_PROJECT_ID: ${{ vars.SANITY_PROJECT_ID }}
      SANITY_STUDIO_DATASET: ${{ vars.SANITY_STUDIO_DATASET }}
      SANITY_STUDIO_API_VERSION: ${{ vars.SANITY_STUDIO_API_VERSION }}
      MIDSCENE_MODEL_NAME: ${{ vars.MIDSCENE_MODEL_NAME }}
      MIDSCENE_MODEL_FAMILY: ${{ vars.MIDSCENE_MODEL_FAMILY }}
      MIDSCENE_MODEL_API_KEY: ${{ secrets.MIDSCENE_MODEL_API_KEY }}
      MIDSCENE_MODEL_BASE_URL: ${{ vars.MIDSCENE_MODEL_BASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build

      - name: Debug env vars
        run: |
          echo "SANITY_STUDIO_PROJECT_ID length: ${#SANITY_STUDIO_PROJECT_ID}"
          echo "SANITY_STUDIO_PROJECT_ID value: [$SANITY_STUDIO_PROJECT_ID]"
          echo "SANITY_STUDIO_DATASET value: [$SANITY_STUDIO_DATASET]"
          echo "SANITY_STUDIO_API_VERSION value: [$SANITY_STUDIO_API_VERSION]"
          echo "VITE_SANITY_PROJECT_ID value: [$VITE_SANITY_PROJECT_ID]"

      - name: Generate Sanity types
        run: npm run generate-types
        working-directory: apps/studio

      - name: Build all packages
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npm test

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Midscene report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: midscene-report
          path: midscene_run/
          retention-days: 14
